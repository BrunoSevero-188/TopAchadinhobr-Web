<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#010101" />
    <meta
      name="description"
      content="Top Achadinhos BR — Promoções reais, cupons exclusivos e dicas para economizar todos os dias."
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Top Achadinhos" />

    <title>Top Achadinhos BR — Produtos do Mês</title>

    <link rel="icon" href="assets/TopAchadinhoLogo.png" type="image/png" />
    <link rel="apple-touch-icon" href="assets/TopAchadinhoLogo.png" />
    <link rel="manifest" href="manifest.json" />

    <link rel="stylesheet" href="css/globals.css" />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <main class="main">
      <div class="container">
        <section>
          <header class="site-header">
            <div class="site-header__logo-wrap">
              <img id="header-logo" src="assets/TopAchadinhoLogo.png" alt="Top Achadinho" width="500" height="500" />
            </div>
            <h1 class="site-header__title">Top Achadinhos br - Produtos do Mês</h1>
          </header>

          <div id="user-identifier" class="user-identifier" aria-live="polite"></div>
          <button id="switch-to-guest" type="button" class="user-switch-to-guest" aria-hidden="true">
            Mudar para anônimo
          </button>



          <div class="hero">
            <div class="hero__content">
              <div id="texto-anuncio" class="texto-anuncio" aria-live="polite"></div>
            </div>

            <nav id="mobile-social" class="mobile-social" aria-label="Redes sociais"></nav>
          </div>

          <div id="produtos-grid" class="produtos-grid" aria-label="Lista de produtos"></div>

          <section id="login-modal" class="login-modal" aria-label="Escolha como entrar">
            <div class="login-modal__overlay" data-close="true" aria-hidden="true"></div>
            <div class="login-modal__card" role="dialog" aria-modal="true" aria-labelledby="login-modal__title">
              <h2 id="login-modal__title" class="login-modal__title">Quer entrar?</h2>
              <p class="login-modal__subtitle">Você pode conectar com Google ou continuar sem conta.</p>

              <div class="login-modal__actions">
                <button id="login-google" type="button" class="login-modal__btn login-modal__btn--google">
                  Conectar com Google
                </button>

                <button id="login-guest" type="button" class="login-modal__btn login-modal__btn--guest">
                  Continuar sem conta
                </button>
              </div>

              <p id="login-status" class="login-modal__status" aria-live="polite"></p>

              <div class="login-modal__actions login-modal__actions--second">
                <button id="login-change-to-guest" type="button" class="login-modal__btn login-modal__btn--guest login-modal__btn--small">
                  Mudar para anônimo
                </button>
              </div>
            </div>
          </section>

        </section>


        <footer class="site-footer">
          <p>
            © <span id="ano-atual"></span> Top Achadinhos BR —
            <a href="https://www.instagram.com/top_achadinho.br" target="_blank" rel="noopener noreferrer">Instagram</a>
          </p>
        </footer>
      </div>
    </main>

    <aside class="slidebar" aria-label="Barra lateral de redes sociais">
      <img id="slidebar-logo" class="slidebar__logo" src="assets/TopAchadinhoLogo.png" alt="Top Achadinhos" width="64" height="64" />
      <div id="slidebar-links" class="slidebar__links"></div>
    </aside>

    <script>
      document.getElementById("ano-atual").textContent = new Date().getFullYear();
    </script>
    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
